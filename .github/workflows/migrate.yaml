name: New Tunes Thursday

on:
  schedule:
    - cron: "0 2 * * 4" # Midnight Wednesday PT (8am UTC Thursday)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.x"
      - run: echo "$SPOTIPY_CACHE" > .cache
        env:
          SPOTIPY_CACHE: ${{ secrets.SPOTIPY_CACHE }}
      - run: pip install spotipy PyJWT
      - run: python spotify.py --action migrate
        env:
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
          SPOTIPY_REDIRECT_URI: "127.0.0.1"
